<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Starter</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MyProject</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <h1 class="text-center">Welcome to Blog</h1>
        <p class="text-center">This is your starter template 🚀</p>
        {% load static %}

        <a href="{% static 'blog/mylist.txt' %}">Download</a>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Card 1</h5>
                    <p>Some example text.</p>
                    <button class="btn btn-primary">Click</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Card 2</h5>
                    <p>Some example text.</p>
                    <button class="btn btn-success">Click</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Card 3</h5>
                    <p>Some example text.</p>
                    <button class="btn btn-danger">Click</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
